site_name: Borne d'Arcade
site_description: Documentation complète de la Borne d'Arcade - Guide utilisateur, installation et technique
site_author: Zwartkat
site_url: https://zwartkat.github.io/borne/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: purple
    - scheme: slate
      primary: indigo
      accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - nav.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Guide Utilisateur:
    - Vue d'ensemble: guide-utilisateur/overview.md
    - Installation: guide-utilisateur/installation.md
    - Contrôles: guide-utilisateur/controls.md
    - Dépannage: guide-utilisateur/troubleshooting.md
  - Documentation Technique:
    - Module Arcade: documentation-technique/arcade-module.md
    - Build et Compilation: documentation-technique/build.md
    - Add a game: documentation-technique/add-game.md
