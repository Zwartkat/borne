name: Deploy Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Déclencheur manuel (Le bouton "Run workflow")
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java & Python
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install & Build MkDocs
        run: |
          pip install mkdocs mkdocs-material
          if [ -f "requirements-docs.txt" ]; then pip install -r requirements-docs.txt; fi
          mkdocs build

      - name: Generate Javadoc
        run: |
          mkdir -p site/api
          # On cherche tous les .java en excluant les tests
          find . -name "*.java" ! -path "*/tests/*" > sources.txt
          if [ -s sources.txt ]; then
            javadoc -d site/api -cp "./MG2D.jar" -sourcepath . -quiet @sources.txt
          else
            echo "Aucun fichier Java trouvé"
          fi

      - name: Deploy
        # On déploie si c'est un push sur main OU un déclenchement manuel
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # cname: ton-domaine.com # À décommenter si tu as un domaine