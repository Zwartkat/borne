name: Deploy Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java & Python
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install & Build MkDocs
        run: |
          pip install mkdocs mkdocs-material
          if [ -f "requirements-docs.txt" ]; then pip install -r requirements-docs.txt; fi
          mkdocs build

      - name: Generate Javadoc
        run: |
          mkdir -p site/api
          directories=$(find . -type d ! -path "*/tests*" ! -path "./site*" ! -path "." -exec sh -c 'ls -1 "{}"/*.java 2>/dev/null | grep -q . && echo "{}"' \;)

          for dir in $directories; do
            echo "Génération de la Javadoc pour : $dir"
            dest_dir="site/api/$(basename $dir)"
            mkdir -p "$dest_dir"
            
            # On lance javadoc sur tous les fichiers du dossier courant uniquement
            # Le classpath inclut le dossier lui-même pour résoudre les interfaces locales
            javadoc -d "$dest_dir" \
                    -cp ".:./MG2D.jar:$dir" \
                    -sourcepath "$dir" \
                    -quiet "$dir"/*.java || echo "Avertissement : Javadoc incomplète pour $dir"
          done

          if [ -z "$(ls -A site/api)" ]; then
            echo "Aucune Javadoc n'a pu être générée."
          fi

      - name: Deploy
        # On déploie si c'est un push sur main OU un déclenchement manuel
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # cname: ton-domaine.com # À décommenter si tu as un domaine