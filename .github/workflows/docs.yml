name: Generate Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  javadoc:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Generate JavaDoc for Arcade
      run: |
        echo "🔄 Generating JavaDoc for Arcade module..."
        javadoc -d doc_borne -cp ./MG2D.jar -sourcepath . Arcade/*.java Main.java
        echo "✅ JavaDoc generated successfully"
    
    - name: Generate Game Documentation
      run: |
        echo "🔄 Generating Game Documentation..."
        python generate_game_docs_v2.py
        echo "✅ Game documentation generated successfully"
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./doc_borne
        destination_dir: api
    
    - name: Deploy Game Docs to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs_jeux
        destination_dir: games
    
    - name: Documentation Summary
      run: |
        echo "## 📚 Documentation Generated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Available Documentation:" >> $GITHUB_STEP_SUMMARY
        echo "- 📖 [API Documentation](https://github.com/${{ github.repository }}/wiki)" >> $GITHUB_STEP_SUMMARY
        echo "- 🎮 [Game Guides](https://github.com/${{ github.repository }}/wiki)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Files Generated:**" >> $GITHUB_STEP_SUMMARY
        echo "- \`doc_borne/\` - JavaDoc API" >> $GITHUB_STEP_SUMMARY
        echo "- \`docs_jeux/\` - Game Documentation" >> $GITHUB_STEP_SUMMARY
