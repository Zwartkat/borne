name: Tests - Arcade Module

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download JUnit Console Standalone
        run: |
          mkdir -p lib
          wget -q https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.9.3/junit-platform-console-standalone-1.9.3.jar \
            -O lib/junit-console.jar

      - name: Compile Arcade module
        run: |
          cd Arcade
          javac -cp ".:../MG2D.jar" \
            Boite.java BoiteDescription.java BoiteImage.java BoiteSelection.java \
            Bouton.java ClavierBorneArcade.java Game.java Graphique.java \
            HighScore.java LigneHighScore.java Pointeur.java
          cd ..

      - name: Compile tests
        run: |
          cd Arcade/tests
          javac -cp ".:../../Arcade:../../lib/junit-console.jar:../../MG2D.jar" Test*.java
          cd ../..

      - name: Run tests
        run: |
          mkdir -p test-results
          java -jar lib/junit-console.jar \
            --classpath ".:Arcade:Arcade/tests:MG2D.jar" \
            --scan-classpath \
            --reports-dir test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 30