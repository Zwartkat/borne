name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Extract version from tag
      id: tag_name
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Compile full project
      run: |
        echo "🔄 Compiling Arcade module..."
        cd Arcade
        javac -cp .:../MG2D.jar *.java
        cd ..

        echo "🔄 Compiling Main..."
        javac -cp .:./MG2D.jar *.java
        echo "✅ Compilation complete"

    - name: Generate JavaDoc
      run: |
        echo "📚 Generating JavaDoc..."
        javadoc -d doc_borne -cp ./MG2D.jar -sourcepath . Arcade/*.java Main.java
        echo "✅ JavaDoc generated"
    
    - name: Generate Game Documentation
      run: |
        if [ -f "generate_game_docs_v2.py" ]; then
          python generate_game_docs_v2.py
          echo "✅ Game docs generated"
        fi
    
    - name: Create release artifacts
      run: |
        mkdir -p release-artifacts
        
        # Archive de documentation API
        if [ -d "doc_borne" ]; then
          cd doc_borne && zip -r ../release-artifacts/api-documentation-${{ steps.tag_name.outputs.VERSION }}.zip . && cd ..
        fi
        
        # Archive de documentation Jeux
        if [ -d "docs_jeux" ]; then
          cd docs_jeux && zip -r ../release-artifacts/game-documentation-${{ steps.tag_name.outputs.VERSION }}.zip . && cd ..
        fi
        
        # --- AJOUT DU SCRIPT D'INSTALLATION ---
        if [ -f "installer.sh" ]; then
          echo "📦 Adding installer.sh to artifacts..."
          cp installer.sh release-artifacts/
          chmod +x release-artifacts/installer.sh
        fi
        
        # Copier les fichiers compilés
        cp Arcade/*.class release-artifacts/ 2>/dev/null || true
        cp *.class release-artifacts/ 2>/dev/null || true
        
        echo "✅ Release artifacts created"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-artifacts/**
        draft: false
        prerelease: false
        body: |
          # Release ${{ steps.tag_name.outputs.VERSION }}
          
          ## 📦 What's included:
          - **installer.sh** (Script d'installation automatisé)
          - API Documentation (JavaDoc)
          - Game Documentation
          - Compiled Arcade & Main modules
          
          ## 🎮 Games Included:
          - Ball Blast, Columns, CursedWare, DinoRail, InitialDrift, JavaSpace, Kowasu_Renga, Minesweeper, OsuTile, PianoTile, Pokechecs, Pong, Puissance_X, Snake_Eater, TronGame
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Release Summary
      run: |
        echo "## 🎉 Release Created" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** ${{ steps.tag_name.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **installer.sh** inclus" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Documentation API & Jeux incluse" >> $GITHUB_STEP_SUMMARY