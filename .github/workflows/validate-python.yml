name: Validate Python Games

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'projet/**/src/**'
      - 'projet/**/requirements.txt'
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Validate Ball Blast
      continue-on-error: true
      run: |
        echo "🔍 Validating Ball Blast..."
        cd projet/ball-blast
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt > /dev/null 2>&1 || true
        fi
        python -m py_compile src/*.py 2>&1 || true
        echo "✅ Ball Blast compilation check done"
        cd ../..
    
    - name: Syntax validation
      run: |
        echo "🔍 Running Python syntax checks..."
        find projet -name "*.py" -type f | while read file; do
          python -m py_compile "$file" 2>&1 || echo "⚠️ Issue in $file"
        done
        echo "✅ Syntax check complete"
    
    - name: Summary
      run: |
        echo "## ✅ Python Games Validation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Checked Games:" >> $GITHUB_STEP_SUMMARY
        ls -d projet/*/src 2>/dev/null | wc -l | xargs -I {} echo "- {} Python game folders" >> $GITHUB_STEP_SUMMARY
